<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance & Payroll Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; }
header { background:#333; color:white; padding:10px; text-align:center; }
button { margin:2px; padding:6px; font-size:14px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
th,td { border:1px solid #ddd; padding:6px; text-align:center; }
.full {background:#4CAF50;color:white;}
.half {background:#FFC107;}
.absent {background:#F44336;color:white;}
</style>
</head>

<body>
<header><h2>Attendance & Payroll Tracker (Online)</h2></header>

<button onclick="addWorker()">Add Worker</button>
<button onclick="generateReport()">Reports</button>

<table id="attendanceTable">
<thead>
<tr>
<th>#</th><th>Name</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="summary"></div>

<script>

// 🔗 SUPABASE CONNECTION
const supabase = window.supabase.createClient(
  "https://bjuqcpbpujqzdqffrgxi.supabase.co",
  "sb_publishable_e6fj_76zFVKYOcwFvyjzNw_5_52Gyc4"
);

let workers = [];
const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

// LOAD DATA
async function loadData(){
 const { data, error } = await supabase.from('workers').select('*');

 if(error){ console.log(error); return; }

 workers = data.map(w => ({
   id: w.id,
   name: w.name,
   rate: w.rate,
   openingBalance: w.opening_balance || 0,
   attendance: w.attendance || Array(7).fill('Absent'),
   deductions: w.deductions || 0,
   paid: w.paid || 0,
   carried: w.carried || 0
 }));
}

// SAVE DATA
async function saveData(){
 for(const w of workers){
   await supabase.from('workers').upsert({
     id: w.id,
     name: w.name,
     rate: w.rate,
     opening_balance: w.openingBalance,
     attendance: w.attendance,
     deductions: w.deductions,
     paid: w.paid,
     carried: w.carried
   });
 }
}

// RENDER TABLE
function render(){
 let tbody = document.querySelector('#attendanceTable tbody');
 tbody.innerHTML = '';
 let totalManDays = 0;

 workers.forEach((w,i)=>{
   let row = document.createElement('tr');

   let dayCells = w.attendance.map((s,d)=>
     `<td><button class="${s.toLowerCase()}" onclick="toggle(${i},${d})">${s}</button></td>`
   ).join('');

   let total = w.attendance.reduce((a,s)=>a+(s==='Full'?1:s==='Half'?0.5:0),0);
   totalManDays += total;

   row.innerHTML = `<td>${i+1}</td><td>${w.name}</td>${dayCells}<td>${total}</td>`;
   tbody.appendChild(row);
 });

 document.getElementById('summary').innerText = "Total Man Days: " + totalManDays;
}

// TOGGLE ATTENDANCE
function toggle(i,d){
 const states = ['Full','Half','Absent'];
 let current = workers[i].attendance[d];
 workers[i].attendance[d] = states[(states.indexOf(current)+1)%3];
 render();
 saveData();
}

// ADD WORKER
async function addWorker(){
 let name = prompt("Worker Name");
 if(!name) return;

 let rate = parseFloat(prompt("Rate")) || 0;

 workers.push({
   id: crypto.randomUUID(),
   name,
   rate,
   attendance: Array(7).fill('Absent'),
   openingBalance: 0,
   deductions: 0,
   paid: 0,
   carried: 0
 });

 await saveData();
 render();
}

// REPORTS
function generateReport(){
 let jobDays = 0;
 let manDays = 0;

 for(let d=0; d<7; d++){
   let worked = false;
   workers.forEach(w=>{
     if(w.attendance[d] !== 'Absent'){
       worked = true;
       manDays += (w.attendance[d]==='Full'?1:0.5);
     }
   });
   if(worked) jobDays++;
 }

 let text = `JOB REPORT\nDays Worked: ${jobDays}\nMan Days: ${manDays}\n\n`;

 workers.forEach(w=>{
   let daysWorked = w.attendance.reduce((a,s)=>a+(s==='Full'?1:s==='Half'?0.5:0),0);
   let total = w.openingBalance + daysWorked*w.rate;

   text += `${w.name}\nDays: ${daysWorked}\nPay: ${total}\n\n`;
 });

 alert(text);
}

// INIT
window.onload = async function(){
 await loadData();
 render();
};

</script>
</body>
</html>
