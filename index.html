<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance & Payroll Tracker</title>
<style>
body { font-family: Arial; margin:0; padding:0; }
header { background:#333; color:white; padding:10px; text-align:center; }
button { margin:2px; padding:6px; font-size:14px; }
table { width:100%; border-collapse:collapse; font-size:14px; }
th,td { border:1px solid #ddd; padding:6px; text-align:center; }
.full {background:#4CAF50;color:white;}
.half {background:#FFC107;}
.absent {background:#F44336;color:white;}
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); overflow:auto; z-index:1000; }
.modal-content { background:white; margin:0; padding:10px; width:100%; min-height:100%; box-sizing:border-box; }
input, select { width:100%; padding:6px; margin:5px 0; font-size:14px; }
h2,h3,h4 { margin:5px 0; }
hr { margin:5px 0; border:1px solid #ccc; }
.top-bar { display:flex; flex-wrap:wrap; justify-content:center; padding:5px; background:#eee; }
.top-bar button { margin:5px; flex:1 1 40%; max-width:150px; }
.worker-entry { border:1px solid #ccc; padding:5px; margin:3px 0; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>
<header>
<h2>Attendance & Payroll Tracker</h2>
</header>
<div class="top-bar">
<button onclick="openWorkerModal()">Workers</button>
<button onclick="openPayCycle()">Pay Cycle</button>
<button onclick="openRunningTotals()">Running Totals</button>
<button onclick="openAttendanceHistory()">Attendance History</button>
<button onclick="openPayrollHistory()">Payroll History</button>
</div>

<!-- ATTENDANCE TABLE -->
<table id="attendanceTable">
<thead>
<tr>
<th>#</th><th>Name</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>
<div id="totalDays" style="padding:5px;font-weight:bold;"></div>

<!-- WORKER MODAL -->
<div id="workerModal" class="modal">
<div class="modal-content">
<h3>Workers</h3>
<div id="workerList"></div>
<hr>
<h4>Add / Edit Worker</h4>
<input id="workerName" placeholder="Worker Name">
<select id="payType">
<option value="daily">Daily</option>
<option value="hourly">Hourly</option>
</select>
<input id="rate" type="number" placeholder="Rate">
<input id="balance" type="number" placeholder="Opening Balance">
<button onclick="saveWorker()">Save</button>
<button onclick="closeWorkerModal()">Close</button>
</div>
</div>

<!-- FULL-PAGE PAY CYCLE -->
<div id="payCycleModal" class="modal">
<div class="modal-content">
<h3>Pay Cycle</h3>
<div id="payCycleList"></div>
<button onclick="generatePayrollReport()">Generate Payroll Report</button>
<button onclick="finalizePayCycle()">Close Pay Cycle</button>
<button onclick="closePayCycle()">Close</button>
<div id="payrollReport"></div>
</div>
</div>

<!-- FULL-PAGE RUNNING TOTALS -->
<div id="runningTotalsModal" class="modal">
<div class="modal-content">
<h3>Running Totals</h3>
<div id="jobOverview"></div>
<div id="workerTotals"></div>
<button onclick="closeRunningTotals()">Close</button>
</div>
</div>

<!-- FULL-PAGE ATTENDANCE HISTORY -->
<div id="attendanceHistoryModal" class="modal">
<div class="modal-content">
<h3>Attendance History</h3>
<div id="attendanceHistoryList"></div>
<button onclick="closeAttendanceHistory()">Close</button>
</div>
</div>

<!-- FULL-PAGE PAYROLL HISTORY -->
<div id="payrollHistoryModal" class="modal">
<div class="modal-content">
<h3>Payroll History</h3>
<select id="payrollSelect" onchange="loadPayrollReport()"></select>
<div id="payrollReportHistory"></div>
<button onclick="closePayrollHistory()">Close</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<script>
// --- SUPABASE SETUP ---
const SUPABASE_URL = 'https://bjuqcpbpujqzdqffrgxi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_e6fj_76zFVKYOcwFvyjzNw_5_52Gyc4';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// --- INITIALIZATION ---
const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let workers=[];
let editIndex=null;

// --- DATE HELPERS ---
function getMonday(d){
 let day=d.getDay();
 let m=new Date(d);
 m.setDate(d.getDate()-(day===0?6:day-1));
 m.setHours(0,0,0,0);
 return m;
}

// --- LOAD/SAVE WORKERS ---
async function loadWorkers(){
 let { data, error } = await supabase.from('workers').select('*');
 if(error) { console.error(error); return; }
 workers = data.map(w => ({ ...w, attendance: w.attendance || Array(7).fill('Absent') }));
 renderAttendance();
}

async function saveWorker(){
 let name=document.getElementById('workerName').value;
 if(!name){ alert('Enter worker name'); return;}
 let data={
  name,
  payType:document.getElementById('payType').value,
  rate:parseFloat(document.getElementById('rate').value)||0,
  openingBalance:parseFloat(document.getElementById('balance').value)||0,
  attendance:Array(7).fill('Absent')
 };
 if(editIndex!==null){
  data.attendance=workers[editIndex].attendance;
  const { error } = await supabase.from('workers').update(data).eq('id', workers[editIndex].id);
  if(error) console.error(error);
  workers[editIndex] = data;
 } else {
  const { data: inserted, error } = await supabase.from('workers').insert([data]).select();
  if(error) console.error(error);
  workers.push(inserted[0]);
 }
 renderWorkerList(); renderAttendance();
 closeWorkerModal();
}

async function deleteWorker(i){
 if(!confirm('Delete worker?')) return;
 const { error } = await supabase.from('workers').delete().eq('id', workers[i].id);
 if(error) console.error(error);
 workers.splice(i,1);
 renderWorkerList(); renderAttendance();
}

// --- RENDER ATTENDANCE ---
function renderAttendance(){
 let tbody=document.querySelector('#attendanceTable tbody');
 tbody.innerHTML='';
 let totalDays=0;
 workers.forEach((w,i)=>{
  if(!w.attendance) w.attendance=Array(7).fill('Absent');
  let row=document.createElement('tr');
  let daysHtml=w.attendance.map((s,d)=>`<td><button class="${s.toLowerCase()}" onclick="toggleAttendance(${i},${d})">${s}</button></td>`).join('');
  let t=w.attendance.reduce((a,s)=>a+(s==='Full'?1:s==='Half'?0.5:0),0);
  totalDays+=t;
  row.innerHTML=`<td>${i+1}</td><td>${w.name}</td>${daysHtml}<td>${t}</td>`;
  tbody.appendChild(row);
 });
 document.getElementById('totalDays').innerText='Total Days: '+totalDays.toFixed(1);
}

// --- ATTENDANCE TOGGLE ---
async function toggleAttendance(i,d){
 const s=['Full','Half','Absent'];
 workers[i].attendance[d]=s[(s.indexOf(workers[i].attendance[d])+1)%3];
 await supabase.from('workers').update({ attendance: workers[i].attendance }).eq('id', workers[i].id);
 renderAttendance();
}

// --- WORKER MODAL ---
function openWorkerModal(){
 editIndex=null;
 document.getElementById('workerName').value='';
 document.getElementById('payType').value='daily';
 document.getElementById('rate').value='';
 document.getElementById('balance').value='';
 renderWorkerList();
 document.getElementById('workerModal').style.display='block';
}
function closeWorkerModal(){ document.getElementById('workerModal').style.display='none'; }

function renderWorkerList(){
 let list=document.getElementById('workerList'); list.innerHTML='';
 workers.forEach((w,i)=>{
  let div=document.createElement('div'); div.className='worker-entry';
  div.innerHTML=`<span>${w.name}</span>
  <span>
    <button onclick="editWorker(${i})">Edit</button>
    <button onclick="deleteWorker(${i})">Delete</button>
  </span>`;
  list.appendChild(div);
 });
}

function editWorker(i){
 editIndex=i;
 let w=workers[i];
 document.getElementById('workerName').value=w.name;
 document.getElementById('payType').value=w.payType;
 document.getElementById('rate').value=w.rate;
 document.getElementById('balance').value=w.openingBalance||0;
}

// --- PAY CYCLE FUNCTIONS ---
async function openPayCycle(){
 let div=document.getElementById('payCycleList'); div.innerHTML='';
 workers.forEach((w,i)=>{
  let daysWorked=w.attendance.reduce((a,s)=>a+(s==='Full'?1:s==='Half'?0.5:0),0);
  let total=w.openingBalance + daysWorked*w.rate;
  w.totalOwed = total;
  let sec=document.createElement('div');
  sec.innerHTML=`<h4>${w.name}</h4>Days Worked: ${daysWorked}<br>Rate: ${w.rate}<br>Total Owed: ${total.toFixed(2)}<hr>`;
  div.appendChild(sec);
 });
 document.getElementById('payCycleModal').style.display='block';
}
function closePayCycle(){ document.getElementById('payCycleModal').style.display='none'; }

function generatePayrollReport(){
 let report=document.getElementById('payrollReport');
 report.innerHTML='';
 let totalManDays=0;
 let activeDays = [false,false,false,false,false,false,false];
 workers.forEach(w=>{
  let daysWorked = w.attendance.reduce((a,s,d)=>{
    if(s!=='Absent') activeDays[d]=true;
    return a+(s==='Full'?1:s==='Half'?0.5:0);
  },0);
  totalManDays+=daysWorked;
  report.innerHTML+=`<strong>${w.name}</strong><br>Days Worked: ${daysWorked}<br>Rate: ${w.rate}<br>Total: ${(daysWorked*w.rate).toFixed(2)}<hr>`;
});
let daysWithWork = activeDays.filter(v=>v).length;
report.innerHTML=`<h4>JOB REPORT</h4>Days Worker: ${daysWithWork}<br>Man Days: ${totalManDays}<hr>` + report.innerHTML;
}

// --- INIT ---
window.onload = async function(){
 await loadWorkers();
};
</script>
</body>
</html>
